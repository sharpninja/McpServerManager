McpServer:
  BaseUrl: http://localhost:7147
  ApiKey: ""
  WorkspacePath: ""

Logging:
  LogLevel:
    Default: Information
    Microsoft.AspNetCore: Warning

AllowedHosts: "*"

Authentication:
  Schemes:
    Cookie:
      CookieName: McpServer.Web.Auth
      LoginPath: /login
      LogoutPath: /logout
      AccessDeniedPath: /access-denied
    OpenIdConnect:
      DiscoverAuthorityFromMcpAuthConfig: true
      Authority: https://example.invalid
      ClientId: placeholder-client-id
      ClientSecret: placeholder-client-secret
      ResponseType: code
      CallbackPath: /signin-oidc
      SignedOutCallbackPath: /signout-callback-oidc
      MapInboundClaims: false
      GetClaimsFromUserInfoEndpoint: true
      ClaimMapping:
        NameClaimType: name
        RoleClaimType: role
      Scope:
        - openid
        - profile
        - roles
  Authorization:
    RequireAuthenticatedUserByDefault: false
    Policies:
      AgentManager:
        Roles:
          - agent-manager
          - admin
      Admin:
        Roles:
          - admin
