<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Wireframe</title>
  <link rel="stylesheet" href="../shared/wireframe.css" />
</head>
<body>
  <main class="gh-content">
    <h1 class="page-title">Dashboard</h1>
    <p class="subtitle">GitHub-like overview: quick health, activity, and action entry points.</p>

    <section class="card-grid">
      <div class="card"><div class="label">Server Health</div><div class="value">Healthy</div></div>
      <div class="card"><div class="label">Workspaces</div><div class="value">3</div></div>
      <div class="card"><div class="label">Active TODOs</div><div class="value">25</div></div>
      <div class="card"><div class="label">Recent Sessions</div><div class="value">5</div></div>
    </section>

    <section class="panel">
      <h2>Recent Activity</h2>
      <table class="table">
        <thead><tr><th>Time</th><th>Area</th><th>Summary</th><th></th></tr></thead>
        <tbody>
          <tr><td>11:54</td><td>Wireframes</td><td>Plan updated for GitHub parity + Monaco</td><td><button class="btn">View</button></td></tr>
          <tr><td>11:48</td><td>Session Log</td><td>Planning entry created</td><td><button class="btn">View</button></td></tr>
        </tbody>
      </table>
    </section>

    <p><a href="../index.html">Back to index</a></p>
  </main>
</body>
</html>
