  - id: uicore-vm-relay-gaps
    title: 'Gap tracker: apps vs UI.Core ViewModels + RelayCommands'
    estimate: 2d
    note: Gap tracker completed after GAP-020 RelayCommand closure and parity-inventory synchronization to plan phases.
    done: true
    completed: 2026-03-03T12:40:56Z
    description:
    - Living inventory of concrete refactor gaps between current app ViewModels and McpServer.UI.Core ViewModels/RelayCommands.
    - 'GAP-001 Runtime dispatch mismatch: app uses McpServerManager.Core.Cqrs.Mediator while UI.Core requires McpServer.Cqrs.Dispatcher + Result<T> pipeline semantics.'
    - 'GAP-002 Missing adapter layer: app has no implementations of McpServer.UI.Core.Services.ITodoApiClient or IWorkspaceApiClient.'
    - 'GAP-003 Todo architecture mismatch: current TodoListViewModel combines list + detail + markdown editor + prompt streaming; UI.Core splits these across TodoListViewModel and TodoDetailViewModel (plus prompt-specific VMs).'
    - 'GAP-004 Todo command surface mismatch: Desktop/Android bindings require NewTodo/SaveEditor/RefreshEditor/ToggleDone/StopAction/OpenAiChat/Copilot* commands not exposed by UI.Core list VM.'
    - 'GAP-005 Todo data-shape mismatch: current UI binds GroupedItems/TodoListEntry and markdown EditorText; UI.Core exposes flat Items + structured detail fields.'
    - 'GAP-006 Phone TODO UX coupling: PhoneTodoView code-behind depends on CurrentTodoDetail + existing command/property names; direct UI.Core replacement would break navigation/edit flows.'
    - 'GAP-007 Workspace command coverage mismatch: current WorkspaceViewModel includes create/update/delete/status/health/start/stop/global-prompt operations; UI.Core workspace VMs currently expose list/get/policy/init only.'
    - 'GAP-008 Workspace editor-shape mismatch: app binds EditorPromptTemplateText/StatusPrompt/ImplementPrompt/PlanPrompt and global prompt fields not represented in UI.Core WorkspaceDetailViewModel.'
    - 'GAP-009 MainWindow coupling mismatch: WorkspaceCatalogChanged event and connection-picker refresh logic depend on current WorkspaceViewModel contracts.'
    - 'GAP-010 Workspace context propagation mismatch: app uses WorkspacePathChanged event fan-out; UI.Core expects shared WorkspaceContextViewModel.ActiveWorkspacePath updates.'
    - 'GAP-011 Auth policy wiring gap: UI.Core handlers expect IAuthorizationPolicyService/IRoleContext services; app currently has no explicit registrations for these abstractions.'
    - 'GAP-012 Busy/logging semantics mismatch: app log view reads AppLogService entries while UI.Core dispatcher has its own dispatch-log provider model.'
    - 'GAP-013 TODO command matrix mismatch (explicit): NewTodo/SaveNewTodo/CancelNewTodo/StopAction/EditorZoom*/OpenAiChat/ClearEditor have no direct UI.Core command equivalents.'
    - 'GAP-014 Workspace command matrix mismatch (explicit): NewWorkspace/SaveEditor/DeleteSelected/GetSelectedStatus/CheckSelectedWorkspaceHealth/Start/Stop/Load|Save|ResetGlobalPrompt have no direct UI.Core workspace VM command equivalents.'
    - 'GAP-015 Selection model mismatch: current bindings use SelectedEntry object while UI.Core list VMs expose SelectedIndex + SelectedItem derived access.'
    - 'GAP-016 Formatting model mismatch: current TODO editor is markdown-first; UI.Core detail editor is structured fields-first.'
    - 'DECISION-UI-FIRST: favor McpServer.UI.Core contracts; refactor Desktop/Android app layers toward UI.Core ViewModels/RelayCommands instead of preserving legacy app-specific command/property surfaces as the long-term target.'
    - 'Closure policy A: where UI.Core already provides equivalent behavior, app naming/shapes will migrate to UI.Core semantics.'
    - 'Closure policy B: when behavior is missing in UI.Core, prefer adding reusable UI.Core message/handler/viewmodel coverage first; app-local wrappers are temporary scaffolding only and must have explicit removal checkpoints.'
    - 'GAP-017 Endpoint handler coverage mismatch: live server exposes operations with no McpServer.UI.Core handler path (103 missing operations across 13 domains in current audit).'
    - 'GAP-018 Cross-host parity scope mismatch: migration inventory is currently Desktop/Android-centric, but required target includes Director TUI and Blazor Web UI with identical core logic and endpoint coverage.'
    - 'GAP-019 Extension boundary gap: host-specific behavior must layer via host ViewModels that extend/combine McpServer.UI ViewModels; shared endpoint logic must not fork per host.'
    - 'GAP-020 RelayCommand-chain omissions: Workspace init, Tunnel lifecycle, and Template detail operations currently use method-only ViewModel calls (no exposed RelayCommand), violating the required RelayCommand -> Handler -> ViewModel mutation contract.'
    done-summary: Closed GAP-020 by adding missing UI.Core RelayCommands for workspace init, tunnel lifecycle, and template detail flows; synchronized sequencing/coverage artifacts (including TUI+Blazor parity inventory) and validated with build + tests.
    remaining: Execute M1 and M2 first to close handler and RelayCommand-chain gaps, then run M3 normalization, M4 audit/remediation, and M5 Director/Web migration.
    technical-details:
    - 'Current app surfaces inspected: src/McpServerManager.Core/ViewModels/TodoListViewModel.cs, WorkspaceViewModel.cs, MainWindowViewModel.cs, src/McpServerManager.Desktop/Views/TodoListView.axaml, WorkspaceView.axaml, src/McpServerManager.Android/Views/TodoListView.axaml, PhoneTodoView.axaml(.cs), WorkspaceView.axaml(.cs).'
