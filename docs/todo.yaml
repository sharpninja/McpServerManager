  - id: MCP-VOICECHAT-001
    title: Add Voice Chat settings to Android and Desktop
    estimate: 3d
    note: 'Plan refreshed on 2026-03-15. Scope decision: shared voice settings are cross-platform; wake-word controls remain Android-only; existing wake-word preference keys must remain backward compatible.'
    done: true
    completed: 2026-03-16T02:19:08.1466340Z
    description:
    - Expand the current settings implementation from speech-filter-only into a real Voice Chat settings surface for Desktop and Android.
    - Treat settings state as a single source of truth owned by view model plus persistence services, not by view code-behind controls.
    - Split scope into shared voice settings available on both platforms and Android-only wake-word settings that only render where the runtime capability exists.
    - Persist every supported setting across app restarts and apply persisted defaults back into the active voice runtime without requiring users to re-enter them on each launch.
    - Preserve the existing Speech Filter workflow and extend the Settings tab with a dedicated Voice Chat section rather than replacing current behavior.
    - Keep this item focused on Desktop and Android application settings only; server-side VoiceConversation options, Director and Web hosts, and iOS are out of scope for this TODO.
    done-summary: Implemented shared voice-chat settings persistence and UI for Desktop and Android. Added a shared VoiceChatSettings service with a Desktop file-backed store and an Android SharedPreferences-backed store, expanded the shared SettingsViewModel and Desktop/Android settings screens with voice controls, seeded voice language defaults into the runtime, persisted SimplifiedVoiceView auto-continue, and wired Android wake-word quick controls plus settings saves through the same persisted state with live wake-word service application.
    remaining: 'Execute in five phases: scope freeze, persistence contracts, SettingsViewModel expansion, Desktop and Android UI wiring, then persistence, runtime, and manual validation. Critical acceptance criteria: Desktop and Android both expose shared voice settings in Settings, Android exposes wake-word-specific settings without polluting Desktop, persisted values survive restart, and runtime defaults are seeded from the saved settings instead of hard-coded view state.'
    technical-details:
    - src/McpServer.UI.Core/ViewModels/SettingsViewModel.cs currently owns only SpeechFilterWords and StatusMessage; the detailed plan must extend this settings state or compose a dedicated voice-settings collaborator without moving persistence into the views.
    - src/McpServerManager.Core/ViewModels/SettingsViewModel.cs is a thin wrapper over the UI.Core settings VM; keep MVVM by injecting any new voice-settings services here rather than storing values in Desktop or Android code-behind.
    - src/McpServerManager.Desktop/Views/SettingsView.axaml and src/McpServerManager.Android/Views/PhoneSettingsView.axaml currently render only the speech-filter editor; append a Voice Chat group to both surfaces and keep the existing speech-filter section intact.
    - src/McpServer.UI.Core/ViewModels/VoiceConversationViewModel.cs already exposes Language with a hard default of en-US; replace the hard-coded startup default with a persisted user preference during voice-VM creation or bootstrap.
    - src/McpServerManager/Views/SimplifiedVoiceView.axaml plus .cs contain an AutoContinueToggle whose startup state is currently view-local and hardcoded true; migrate that value to persisted settings and apply it from VM-owned state.
    - src/McpServerManager.Android/Views/VoiceConversationView.axaml plus .cs currently keep WakePhraseComboBox and AutoListenOnWakeCheckBox behavior close to the view; move default state ownership to persisted settings while leaving platform-only event glue in the view.
    - src/McpServerManager.Android/Services/AndroidWakeWordServices.cs already has persisted wake-word settings using SharedPreferences keys WakePhrase and WakeSensitivity; reuse or wrap this store instead of creating a parallel Android-only settings source.
    - src/McpServerManager.Android/Services/AndroidPorcupineWakeWordEngine.cs already resolves PicovoiceAccessKey from SharedPreferences key PicovoiceAccessKey; expose that setting in Android UI and save it to the same key to avoid split configuration paths.
    - src/McpServerManager.Core/Services/SpeechFilterService.cs is the current precedent for per-user persisted settings on Desktop; implement the Desktop voice-settings store with the same per-user, app-local persistence expectations rather than mutating packaged appsettings.config.
    - 'SSOT and MVVM rule: settings views must bind to view model properties and commands only; code-behind may handle platform APIs, but it must not become the durable owner of saved setting values.'
    implementation-tasks:
    - task: '[01] Freeze scope and publish the settings matrix: shared settings on Desktop and Android = DefaultLanguage plus AutoContinueEnabled; Android-only settings = WakePhrase plus WakeSensitivity plus AutoListenOnWake plus PicovoiceAccessKey.'
      done: false
