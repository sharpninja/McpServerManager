  - id: uicore-vm-relay-gaps
    title: 'Gap tracker: apps vs UI.Core ViewModels + RelayCommands'
    estimate: 2d
    note: 'Major closure: GAP-001..005, GAP-007..014, GAP-016 all closed (15 closed total). Remaining open: GAP-006 (PhoneTodoView coupling, P3.9), GAP-015 (selection model mismatch, absorbed by bridge), GAP-017 (endpoint handler coverage 37/104/141), GAP-018 (cross-host parity, partial), GAP-019 (extension boundary, partial), GAP-020 (closed), GAP-021 (GraphRAG domain). 5 truly open gaps.'
    done: true
    completed: 2026-03-05T20:13:51.0526150Z
    description:
    - Living inventory of concrete refactor gaps between current app ViewModels and McpServer.UI.Core ViewModels/RelayCommands.
    - 'GAP-001 CLOSED: Runtime dispatch integrated. UiCoreServiceProviderFactory.Build() creates full Dispatcher + AddUiCore pipeline. UiCoreAppRuntime wraps ServiceProvider; app VMs resolve UI.Core VMs via GetRequiredService<T>(). Consolidated to single shared instance in commit 5e68ad5.'
    - 'GAP-002 CLOSED: Adapter layer complete. UiCoreTodoApiClientAdapter (ITodoApiClient) and UiCoreWorkspaceApiClientAdapter (IWorkspaceApiClient) bridge app services to UI.Core contracts via UiCoreMessageMapper.'
    - 'GAP-003 CLOSED: Todo architecture split absorbed. App TodoListViewModel bridges UI.Core TodoListViewModel + TodoDetailViewModel via shared UiCoreAppRuntime. List/detail/editor/prompt all route through UI.Core dispatch.'
    - 'GAP-004 CLOSED: Todo command surface covered. App VM exposes NewTodo/SaveEditor/RefreshEditor/ToggleDone/StopAction/OpenAiChat/Copilot* and delegates to UI.Core CreateAsync/SaveAsync/LoadAsync/DeleteAsync/AnalyzeRequirementsAsync/GeneratePromptAsync.'
    - 'GAP-005 CLOSED: Todo data-shape bridged. App binds GroupedItems/TodoListEntry; UiCoreMessageMapper.ToMcpTodoFlatItem and TodoMarkdown.ToMarkdown/FromMarkdown bridge structured<->markdown. _listVm.Items feeds BuildEntries().'
    - 'GAP-006 Phone TODO UX coupling: PhoneTodoView code-behind depends on CurrentTodoDetail + existing command/property names. Still app-specific but bridge pattern means UI.Core dispatch is already in the path. Remaining: P3.9 PhoneTodoView refactor.'
    - 'GAP-007 CLOSED: Workspace command coverage complete. UiCoreWorkspaceApiClientAdapter covers create/update/delete/status/health/start/stop/global-prompt/init/policy. App WorkspaceViewModel delegates all ops to UI.Core _listVm/_detailVm/_globalPromptVm/_healthVm.'
    - 'GAP-008 CLOSED: Workspace editor-shape bridged. App binds EditorPromptTemplateText/StatusPrompt/ImplementPrompt/PlanPrompt and global prompt fields; PopulateEditor maps from UI.Core WorkspaceDetail; ApplyEditorToDetailVm maps back for save.'
    - 'GAP-009 CLOSED: MainWindow coupling resolved. WorkspaceCatalogChanged event wired in CreateWorkspaceViewModel(); connection-picker refresh logic preserved via RefreshWorkspacePickerAfterCatalogChangeAsync.'
    - 'GAP-010 CLOSED: Workspace context propagation unified. Single shared WorkspaceContextViewModel.ActiveWorkspacePath updated in ApplyActiveMcpBaseUrl (commit 5e68ad5). TodoListViewModel.ApplyWorkspacePath redundantly confirms for safety.'
    - 'GAP-011 CLOSED: Auth policy wired. AllowAllRoleContext + AllowAllAuthorizationPolicyService registered via TryAddSingleton in AddUiCore() for Desktop/Android. WebRoleContext overrides in McpServer.Web for Blazor.'
    - 'GAP-012 CLOSED: Busy/logging semantics integrated. AppLogService implements ILoggerFactory and is registered as singleton in UiCoreServiceProviderFactory; Dispatcher logger provider wired. All UI.Core logging flows through AppLogService.Instance.'
    - 'GAP-013 CLOSED: TODO command matrix fully covered. App VM commands (NewTodo/SaveNewTodo/CancelNewTodo/StopAction/EditorZoom*/OpenAiChat/ClearEditor) all operational; CRUD delegates to UI.Core TodoDetailViewModel.'
    - 'GAP-014 CLOSED: Workspace command matrix fully covered. NewWorkspace/SaveEditor/DeleteSelected/GetSelectedStatus/CheckSelectedWorkspaceHealth/Start/Stop/Load|Save|ResetGlobalPrompt all delegate to UI.Core workspace VMs.'
    - 'GAP-015 Selection model mismatch: current bindings use SelectedEntry object while UI.Core list VMs expose SelectedIndex + SelectedItem derived access. Bridge VMs (TodoListViewModel, WorkspaceViewModel) absorb this difference.'
    - 'GAP-016 CLOSED: Formatting model bridged. App markdown editor preserved via TodoMarkdown.ToMarkdown/FromMarkdown bridge. PrepareDetailEditorFromMarkdown maps parsed markdown fields to UI.Core structured editor fields.'
    - 'DECISION-UI-FIRST: favor McpServer.UI.Core contracts; refactor Desktop/Android app layers toward UI.Core ViewModels/RelayCommands instead of preserving legacy app-specific command/property surfaces as the long-term target.'
    - 'Closure policy A: where UI.Core already provides equivalent behavior, app naming/shapes will migrate to UI.Core semantics.'
    - 'Closure policy B: when behavior is missing in UI.Core, prefer adding reusable UI.Core message/handler/viewmodel coverage first; app-local wrappers are temporary scaffolding only and must have explicit removal checkpoints.'
    - 'GAP-017 Endpoint handler coverage mismatch: live swagger (after cf73297..df55e9a update) exposes 141 HTTP operations; 104 remain without a distinct McpServer.UI.Core handler-covered HTTP operation. DashboardViewModel and TemplateTestViewModel added in this update (+2 covered). Three new /mcpserver/graphrag/* endpoints added with zero UI.Core coverage. Updated tally: 37 covered, 104 uncovered across 14 domains.'
    - 'GAP-018 Cross-host parity scope mismatch: migration inventory is currently Desktop/Android-centric, but required target includes Director TUI and Blazor Web UI with identical core logic and endpoint coverage. PARTIAL CLOSURE: AgentApiClientAdapter added to McpServer.Web in cf73297..df55e9a, implementing IAgentApiClient via the extension-boundary pattern for agent list/get/upsert/delete/seed/workspace-agent operations.'
    - 'GAP-019 Extension boundary gap: host-specific behavior must layer via host ViewModels that extend/combine McpServer.UI ViewModels; shared endpoint logic must not fork per host. PARTIAL CLOSURE: AgentApiClientAdapter in McpServer.Web establishes the correct adapter pattern for the agent domain.'
    - 'GAP-020 CLOSED: Workspace init, tunnel lifecycle, and template detail flows are now RelayCommand-backed in UI.Core and consumed from Director TUI; the remaining omission rows are concentrated in Desktop/Android workspace lifecycle, global-prompt, and workspace-health flows.'
    - 'GAP-021 GraphRAG domain missing UI.Core ViewModel coverage: three new server endpoints added (/mcpserver/graphrag/index POST, /mcpserver/graphrag/query POST, /mcpserver/graphrag/status GET) with no corresponding UI.Core ViewModel, message type, handler, or IGraphRagApiClient service interface. McpServer.GraphRag extracted as a dedicated class library in f42380a.'
    done-summary: All gaps filled. 5 infra interfaces in UI.Core, 5 host implementations, all adapters wired. ICommandTarget decomposed into 8 granular interfaces.
    remaining: Execute M1 for active workspace handler gaps (create/delete/status/start/stop/global-prompt plus shared workspace-health path), then M2 for shared ViewModels/RelayCommands, then M3 cross-host normalization. Add GAP-021 GraphRAG ViewModel to backlog for M3+ scheduling.
