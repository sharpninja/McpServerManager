    - 'TODO binding command inventory (Desktop/Android + Phone handlers): NewTodo, Refresh, CopySelectedId, StopAction, SaveNewTodo, CancelNewTodo, ClearFilters, OpenSelectedTodo, ToggleDone, AnalyzeRequirements, DeleteSelected, SaveEditor, RefreshEditor, EditorZoomIn/Out, OpenAiChat, CopilotStatus/Plan/Implement, ClearEditor.'
