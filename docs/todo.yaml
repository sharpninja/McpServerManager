  - id: uicore-vm-relay-plan
    title: 'Excruciating plan: refactor apps to UI.Core ViewModels + RelayCommands'
    estimate: 5d
    note: 'M4.1 completed: RequestTracker-local FR/TR/TEST audit artifacts published and linked.'
    done: false
    description:
    - Exhaustive multi-phase UI-first migration plan to move Desktop + Android TODO/Workspace tabs from app-owned ViewModels to McpServer.UI.Core ViewModels/RelayCommands, with app layers adapting to UI.Core as the canonical contract.
    - 'Scope: src/McpServerManager.Core + Desktop/Android Todo/Workspace views + MainWindow wiring. Out of scope for first pass: Voice, Request Tracker, AGENTS viewer, and Settings tabs (no direct UI.Core equivalents yet).'
    - 'Primary success criteria: (1) Todo + Workspace UX parity, (2) commands execute through UI.Core dispatch path, (3) workspace switching still propagates correctly, (4) old parity evaluator spike removed after stable migration.'
    - 'Execution policy: UI-first cutover. Refactor app ViewModels/views to align with UI.Core contracts; use only minimal temporary adapters where unavoidable during incremental migration.'
    - 'Companion tracker: uicore-vm-relay-gaps must be updated whenever new incompatibilities alter sequencing, scope, or risk.'
    - 'Strategic directive applied: favor McpServer.UI.Core by planning app refactors toward UI.Core semantics instead of preserving long-term app-specific command/property surfaces.'
    - 'Cross-host directive: migration scope includes Desktop, Android, Director TUI, and Blazor Web UI; all hosts must share the same McpServer.UI logic and endpoint coverage baseline.'
    - 'Layering directive: host-specific behavior is allowed only as extension/composition over McpServer.UI ViewModels, not as host-specific forks of core endpoint logic.'
    - 'Major phase re-organization applied per directive: implementation is now governed by five primary phases spanning handler coverage, ViewModel/RelayCommand backfill, cross-UI normalization, requirements audit/remediation, and Director/Web migration.'
    - 'Major Phase 1: Backfill Missing Handlers with Unit Tests.'
    - 'Major Phase 2: Backfill missing ViewModels and Relay Commands with Unit and Integration Tests.'
    - 'Major Phase 3: Normalize ViewModel and RelayCommand usage across all UI surfaces and UI tests.'
    - 'Major Phase 4: As-Built Requirements Audit and Remediation.'
    - 'Major Phase 5: Migrate Director and Web UI to McpServerManager workspace.'
    remaining: 'Major-phase order in force: M1 handler backfill, M2 ViewModel/RelayCommand backfill, M3 cross-UI normalization, M4.2 requirements remediation, M5 Director/Web migration.'
    technical-details:
    - 'Phase ordering: P0 discovery baselines -> P1 runtime/adapters -> P2 compatibility wrappers -> P3 TODO tab migration -> P4 Workspace tab migration -> P5 legacy removal -> P6 validation/rollout.'
    - 'Runtime target: instantiate McpServer.Cqrs.Dispatcher + AddUiCore registrations in app composition root, not only ad hoc evaluator construction.'
    - 'Adapter target: implement app-host adapters for McpServer.UI.Core.Services.ITodoApiClient and IWorkspaceApiClient using existing McpTodoService/McpWorkspaceService plus prompt-stream aggregation.'
    - 'Context target: map MainWindow workspace selection events to shared McpServer.UI.Core.ViewModels.WorkspaceContextViewModel.ActiveWorkspacePath.'
    - 'Compatibility target: keep only short-lived transitional wrappers; final state is direct UI binding to UI.Core list/detail ViewModels and commands wherever coverage exists.'
    - 'Gap-driven constraints: GAP-001..GAP-016 tracked in uicore-vm-relay-gaps, with UI-first closure policy now in effect.'
    - 'Refactor cleanup target: remove src/McpServerManager.Core/Services/UiCoreViewModelEvaluator.cs and one-time parity hooks once migrated paths are production.'
    - 'Verification target: run full Desktop + Android smoke checks for TODO/workspace lifecycle operations before removing legacy code paths.'
    - 'Matrix baseline captured: TODO + Workspace command inventories extracted from Desktop/Android XAML bindings and compared against UI.Core command surfaces.'
    - 'Workspace coverage strategy baseline: prioritize extending reusable UI.Core workspace surfaces before introducing any app-local long-term operation paths.'
    - 'Endpoint matrix checkpoint (strict handler criterion): 138 live swagger operations, 37 operations with at least one McpServer.UI.Core handler path, 103 operations with no handler coverage.'
    - 'Host matrix target: Desktop/Android/Director TUI/Blazor consume one shared UI.Core handler/message surface; endpoint gaps are implemented in UI.Core once and reused everywhere.'
    - 'Extension pattern target: host-specific ViewModels may add UX affordances/events but delegate shared CRUD/prompt/workspace operations to UI.Core commands/dispatcher.'
    - Cross-UI use-case matrix baseline captured in docs/architecture/compliance/UI-USECASE-MATRIX.md, including endpoint-group Mermaid diagrams and RelayCommand-chain omissions requiring closure.
    - Use-case matrix now includes per-use-case UI divergence annotations to guide parity closure work (especially P1.8/P1.9/P6.10).
    - 'Major Phase 1 scope: implement missing UI.Core handler coverage for endpoint gaps (GAP-017 domains) and add per-handler unit tests validating success/error/authorization behavior.'
    - 'Major Phase 2 scope: backfill UI.Core ViewModels + RelayCommands for uncovered operations (including GAP-020 surfaces) with unit + integration tests for RelayCommand -> Handler -> mutation chains.'
    - 'Major Phase 3 scope: migrate Phone/Tablet/Desktop/TUI bindings and host extension layers to normalized UI.Core command usage, then enforce cross-host UI test parity.'
    - 'Major Phase 4 scope: run as-built FR/TR/TEST requirements audit, remediate drift, and verify legacy/superseded VM pathways are eliminated.'
    - 'Major Phase 5 scope: migrate Director and Blazor/Web host composition into McpServerManager workspace with shared UI.Core runtime wiring and parity smoke validation.'
    - 'As-built requirements audit artifacts published under docs/Project: Functional-Requirements.md, Technical-Requirements.md, TR-per-FR-Mapping.md, Requirements-Matrix.md, Testing-Requirements.md (projected + uncaptured Android/Desktop coverage).'
    - 'P1.8 completed: UI.Core now exposes RelayCommands for workspace init, tunnel lifecycle, and template detail operations; closure reflected in UI-USECASE-MATRIX and gap tracker completion evidence.'
    - 'P1.9 completed: Director TUI host bindings now execute UI.Core RelayCommands for workspace init, tunnel lifecycle, and template detail operations (HealthScreen, TunnelScreen, TemplatesScreen), removing method-only call paths for these flows.'
