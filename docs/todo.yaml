  - id: ARCH-MIGRATE-001
    title: Migrate Web-UI and Director and UI Packages
    note: 'Slice update: added shared orchestration guardrail (Check-UiCoreSharedOrchestration.ps1) and shared orchestration evidence map, with architecture checks + baseline/behavior artifacts revalidated green.'
    done: true
    completed: 2026-03-06T04:14:58.6051030Z
    description:
    - 'Objective: complete migration of Web UI, Director, and shared UI package usage so all UI behavior is driven by McpServer.UI.Core contracts and shared CQRS handlers.'
    - 'Primary deliverable: remove duplicate UI workflow logic outside McpServer.UI.Core except shell-specific composition and rendering concerns.'
    - 'Scope in: ViewModel alignment, command/query wiring, DI registration convergence, package reference normalization, and parity verification across Desktop, Web, and Director.'
    - 'Scope out: unrelated feature work, broad UX redesign, and schema changes that are not required for migration parity.'
    - 'Dependency gate: ARCH-AUDIT-001 output must be consumed before any irreversible removal of legacy logic.'
    - 'Quality gate policy: no phase is marked complete until compile, tests, and behavioral parity checks pass for impacted surfaces.'
    - 'Migration strategy: incremental vertical slices with feature toggles and side-by-side fallback paths where risk is high.'
    - 'Artifact requirements: migration matrix, gap register, decision log, API surface diff report, and phase completion checklists.'
    - 'Ownership model: each phase has explicit owner, reviewer, and validation evidence captured in session logs.'
    - 'Risk model: high-risk surfaces include auth transitions, workspace switching, TODO mutation paths, and voice conversation integrations.'
    - 'Rollback policy: preserve reversible commits per phase and keep compatibility adapters until two green validation cycles are complete.'
    - 'Definition of done: all targeted consumers build against aligned McpServer.UI.Core APIs, no duplicate logic remains, and regression suite is green.'
    done-summary: 'Completed ARCH-MIGRATE-001 Phase 0-6 migration: shared UI.Core command/status orchestration alignment, host integration guardrails, web/director smoke parity validation, package/distribution verification, residual cleanup enforcement, final parity sign-off, and closure evidence artifacts.'
    remaining: None. Migration tasks completed with verification artifacts and sign-off.
    technical-details:
    - 'Phase 0 governance and baseline:'
    - 0.1 Confirm ARCH-AUDIT-001 findings and classify every migration item as parity required, parity optional, or deferred.
    - '0.2 Capture baseline metrics: build pass/fail, test counts, startup smoke checks, command latency snapshot, and major warning inventory.'
    - 0.3 Generate API surface map for McpServer.UI.Core public ViewModels, service contracts, command models, and query models.
    - 0.4 Generate consumer usage map for McpServer.Web, McpServer.Director, McpServerManager.Core, and any package consumers.
    - 0.5 Create gap register mapping each consumer behavior to current implementation location and target shared location.
    - '0.6 Record migration invariants: no silent behavior changes, no fallback auth downgrades, and no ConfigureAwait(false) in UI surfaces.'
    - 'Phase 1 architecture and dependency alignment:'
    - 1.1 Normalize package and project reference graph so consumers depend on McpServer.UI.Core through explicit project/package references only.
    - 1.2 Align CommunityToolkit.Mvvm and YamlDotNet versions where required to avoid downgrade conflicts.
    - '1.3 Define boundary contracts for shell-specific concerns: process launching, filesystem operations, dispatcher usage, and platform persistence.'
    - 1.4 Introduce or refine adapter interfaces so shell-only concerns remain injectable from each host.
    - 1.5 Lock naming conventions for commands, query DTOs, and route constants shared across Director and Web.
    - 'Phase 2 shared ViewModel and workflow migration:'
    - 2.1 For each audited ViewModel, decide move, inherit, compose, or keep-local with explicit rationale.
    - 2.2 Port duplicated command orchestration into shared handlers in McpServer.UI.Core where shell-agnostic.
    - 2.3 Keep shell rendering concerns local while moving state transitions and command triggering rules to shared layer.
    - 2.4 Add compatibility shims for old method signatures to avoid breaking all consumers at once.
    - 2.5 Mark obsolete shims with removal criteria tied to completion of integration tests.
    - 'Phase 3 McpServer.Web migration:'
    - 3.1 Rebind Web pages/components to migrated shared ViewModels and remove redundant web-local state machines.
    - 3.2 Align endpoint to command/query wiring with shared contracts, including validation and error propagation behavior.
    - 3.3 Ensure workspace resolution and auth semantics remain unchanged while shared logic is adopted.
    - 3.4 Add focused web integration tests for TODO flows, session log flows, workspace switching, and auth-dependent actions.
    - 'Phase 4 McpServer.Director migration:'
    - 4.1 Rewire director commands to shared command/query abstractions with consistent option mapping.
    - 4.2 Align TUI tab state management with shared ViewModel state transitions and refresh semantics.
    - 4.3 Ensure command output formatting remains stable or intentionally versioned when behavior changes are necessary.
    - 4.4 Add director tests for command parity, argument validation, and workspace-scoped behavior.
    - 'Phase 5 package and distribution hardening:'
    - 5.1 Validate packability and metadata for SharpNinja.McpServer.UI.Core and SharpNinja.McpServer.Director artifacts.
    - 5.2 Verify NuGet consumers can restore and build without local project-reference assumptions.
    - 5.3 Validate tool installation and runtime behavior for director using packaged outputs.
    - 5.4 Update release notes and migration notes for downstream consumers.
    - 'Phase 6 cleanup and enforcement:'
    - 6.1 Remove duplicate legacy implementation files after parity validation confirms no regressions.
    - 6.2 Add architecture/compliance checks that fail builds if forbidden duplicate paths reappear.
    - 6.3 Keep grep-based verification scripts for critical route/symbol renames and shared contract adoption checks.
    - 6.4 Finalize documentation of ownership boundaries between UI.Core and host shells.
    - 'Acceptance criteria:'
    - A. All impacted projects build cleanly with no new warning classes introduced by migration.
    - B. Targeted unit/integration tests pass for Web, Director, and shared UI.Core logic.
    - C. Behavioral parity checklist is signed off for TODO, workspace, session log, and auth workflows.
    - D. No remaining audited duplicate ViewModel workflow logic exists outside approved shell adapters.
    - E. Rollback instructions are validated and attached to migration completion record.
    depends-on:
    - ARCH-AUDIT-001
