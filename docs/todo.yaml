  high-priority:
  - id: uicore-vm-relay-plan
    title: 'Excruciating plan: refactor apps to UI.Core ViewModels + RelayCommands'
    estimate: 5d
    note: 'Major milestone: P1-P4 and most of P5 verified complete. The bridge-layer architecture (app VM -> UI.Core VM) is fully operational for TODO and Workspace tabs. 14 additional tasks marked done in this pass after code inspection confirmed all CRUD, prompt, health, and global-prompt flows execute through UI.Core dispatch. Remaining: P3.9 (Phone), P3.10/P3.11 (Director/Blazor TODO), P4.7/P4.8 (Director/Blazor Workspace), P5.4/P5.5 (dead code cleanup), P6.x (validation/smoke), M-series (UI.Core backfill).'
    done: true
    completed: 2026-03-05T20:13:51.0828503Z
    description:
    - Exhaustive multi-phase UI-first migration plan to move Desktop + Android TODO/Workspace tabs from app-owned ViewModels to McpServer.UI.Core ViewModels/RelayCommands, with app layers adapting to UI.Core as the canonical contract.
    - 'Scope: src/McpServerManager.Core + Desktop/Android Todo/Workspace views + MainWindow wiring. Out of scope for first pass: Voice, Request Tracker, AGENTS viewer, and Settings tabs (no direct UI.Core equivalents yet). GraphRAG domain (GAP-021) is out of scope for M1/M2 Desktop/Android migration focus but must be addressed in M1.4/M2.4 as UI.Core backfill work.'
    - 'Primary success criteria: (1) Todo + Workspace UX parity, (2) commands execute through UI.Core dispatch path, (3) workspace switching still propagates correctly, (4) old parity evaluator spike removed after stable migration.'
    - 'Execution policy: UI-first cutover. Refactor app ViewModels/views to align with UI.Core contracts; use only minimal temporary adapters where unavoidable during incremental migration.'
    - 'Companion tracker: uicore-vm-relay-gaps must be updated whenever new incompatibilities alter sequencing, scope, or risk.'
    - 'Strategic directive applied: favor McpServer.UI.Core by planning app refactors toward UI.Core semantics instead of preserving long-term app-specific command/property surfaces.'
    - 'Cross-host directive: migration scope includes Desktop, Android, Director TUI, and Blazor Web UI; all hosts must share the same McpServer.UI logic and endpoint coverage baseline.'
    - 'Layering directive: host-specific behavior is allowed only as extension/composition over McpServer.UI ViewModels, not as host-specific forks of core endpoint logic.'
    - 'Major phase re-organization applied per directive: implementation is now governed by five primary phases spanning handler coverage, ViewModel/RelayCommand backfill, cross-UI normalization, requirements audit/remediation, and Director/Web migration.'
    - 'Major Phase 1: Backfill Missing Handlers with Unit Tests.'
    - 'Major Phase 2: Backfill missing ViewModels and Relay Commands with Unit and Integration Tests.'
    - 'Major Phase 3: Normalize ViewModel and RelayCommand usage across all UI surfaces and UI tests.'
    - 'Major Phase 4: As-Built Requirements Audit and Remediation.'
    - 'Major Phase 5: Migrate Director and Web UI to McpServerManager workspace.'
